services:
  # Backend Service
  - type: web
    name: checkio-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci --include=dev --production=false && npx prisma generate && npm run build
    startCommand: sh -c 'npx prisma db push && if [ "$RUN_SEED" = "true" ]; then npm run seed; fi && npm start'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: checkio-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://checkio-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: RUN_SEED
        value: "false"

  # Frontend Static Site
  - type: web
    name: checkio-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://checkio-backend.onrender.com

databases:
  - name: checkio-db
    region: oregon
    plan: free
    databaseName: checkio
    user: checkio
