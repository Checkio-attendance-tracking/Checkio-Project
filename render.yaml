services:
  # Backend Service
  - type: web
    name: checkio-backend
    runtime: node
    region: oregon
    plan: free
    root: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: checkio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # Frontend Static Site
  - type: static
    name: checkio-frontend
    region: oregon
    plan: free
    root: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: checkio-backend
          property: url

databases:
  - name: checkio-db
    region: oregon
    plan: free
    databaseName: checkio
    user: checkio