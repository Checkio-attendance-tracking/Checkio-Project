services:
  # Backend Service
  - type: web
    name: checkio-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci --include=dev --production=false && npx prisma generate && npm run build
    preDeployCommand: npx prisma db push
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: checkio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # Frontend Static Site
  - type: web
    name: checkio-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://checkio-backend.onrender.com

databases:
  - name: checkio-db
    region: oregon
    plan: free
    databaseName: checkio
    user: checkio